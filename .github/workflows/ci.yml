# Workflow de Integração Contínua focado exclusivamente na execução
# de testes unitários, com estrutura preparada para futuras expansões.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "24"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: velo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: velo/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests
        run: yarn test --run
        
  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: velo/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: velo
        run: yarn install --immutable

      - name: Pull Vercel Config
        run: ./velo/node_modules/.bin/vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build Vercel
        run: ./velo/node_modules/.bin/vercel build --token=$VERCEL_TOKEN

      - name: Verify build output
        run: |
          if [ ! -d .vercel/output ]; then
            echo "Missing .vercel/output after build"
            ls -la .vercel/ || true
            exit 1
          fi
          du -sh .vercel/output

      - name: Deploy Preview no vercel
        run: |
          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3"
            if ./velo/node_modules/.bin/vercel deploy --prebuilt --archive=tgz --target=preview --token=$VERCEL_TOKEN; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed, retrying in 15s..."
              sleep 15
            fi
          done
          exit 1

      
