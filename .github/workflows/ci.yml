# Workflow de Integração Contínua focado exclusivamente na execução
# de testes unitários, com estrutura preparada para futuras expansões.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "24"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: velo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: velo/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests
        run: yarn test --run
        
  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url}}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: velo/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: velo
        run: yarn install --immutable

      - name: Build application
        working-directory: velo
        run: yarn build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Config
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Deploy Preview no vercel
        id: deploy
        run: |
          URL=$(vercel deploy --yes --target=preview --token=$VERCEL_TOKEN)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: velo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: velo/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      
      - name: Install Playwright Browser
        run: yarn playwright install --with-deps chromium

      - name: Run E2E Regression Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright Report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: velo/playwright-report/



      
